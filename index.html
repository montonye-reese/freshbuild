    const doc = {

        blueprint: "It's just a start. Perhaps it can be a battle-hardened blueprint for governance by the people, of the people, and for the people.",
        principles: [
          "True to the spirit of the Declaration \u2014 life, liberty, pursuit of happiness",
          "True to the letter of the Constitution \u2014 balancing powers, justice for all",
          "True to the lesson we\u2019re learning now \u2014 that justice for all requires systems that enforce accountability, and leaders who understand their duty is to the people"
        ],
        startDate: "December 2025"
      },
      sections: [
        {
          id: "character-as-infrastructure",
          title: "Character as Infrastructure",
          description: "The precondition for everything that follows",
          items: [
            {
              id: "character-not-bonus",
              title: "Character is not a bonus \u2014 it is the first structural decision",
              body: "The most important infrastructure decision a democracy makes is not which laws to pass or which institutions to build. It is who it entrusts to operate them. A constitution does not enforce itself. An oversight body does not function when led by someone who sees oversight as an obstacle. A system designed for accountability will produce accountability only if the people running it believe accountability matters \u2014 or at minimum, are unwilling to destroy it. We are living this. Institutions hold \u2014 on paper. The Constitution is still in force. The courts still exist. The inspectors general \u2014 who weren\u2019t fired \u2014 have statutory authority. Yet often, it hardly matters, because the people in charge treat the system not as something to maintain but as something to circumvent, dismantle, or simply ignore. When \u201crespects the rule of law\u201d becomes a compliment rather than a baseline requirement, the floor has already collapsed beneath you. Character is not a wish. It is infrastructure. Neglect it the way you\u2019d neglect a bridge, and the result is the same."
            },
            {
              id: "enforceable-baseline",
              title: "Enforceable baseline standards for public office",
              body: "End the practice of treating basic ethics as optional for elected officials. Require full financial disclosure, mandatory divestment from conflicts of interest, and binding adherence to the same laws officials are sworn to uphold \u2014 with enforcement mechanisms that operate at the speed of the violation, not years after the damage is done."
            },
            
          ]
        },
        {
          id: "civic-formation",
          title: "Civic Formation",
          description: "Building the constitutional instinct from childhood",
          items: [
            {
              id: "pledge",
              title: "Pledge allegiance to the Constitution",
              body: "Replace the pledge to the flag \u2014 a symbol \u2014 with a pledge to the Constitution \u2014 the substance. The flag asks for loyalty to an identity. The Constitution asks for loyalty to a set of principles. These are not the same thing."
            },
            {
              id: "daily-constitution",
              title: "Five minutes of Constitution, every morning, K\u201312",
              body: "Following the pledge, every school day begins with five minutes of constitutional engagement \u2014 songs, recitations, readings. Not as trivia. As muscle memory. Thirteen years of five minutes a day means a population that carries Article I Section 8 the way they carry the lyrics to songs they learned as children. The violation registers before the analysis does. That\u2019s the point."
            },
            {
              id: "belonging-is-infrastructure",
              title: "Belonging as Infrastructure",
              body: "A society that stops maintaining pathways for belonging may find its young people pulled toward whoever offers them belonging first. Scouts, ball clubs, chess teams, theater programs, community workshops \u2014 these are not luxuries or nostalgia. They are integral to the development of well adjusted citizens. When we let such programs atrophy without replacing them with something better, we do not create a generation of rugged individuals. Instead we watch as large swathes of isolated kids find community in the worst corners of the internet. A fresh build system funds and maintains civic institutions where young people are known by name by people beyond their parents. This is as foundational as drinking water."
            }
          ]
        },
        {
          id: "electoral-integrity",
          title: "Electoral Integrity",
          description: "Elections belong to voters, not to money",
          items: [
            {
              id: "purge-lists",
              title: "Standards for voter purge lists with criminal penalties",
              body: "Establish strict, transparent standards for voter roll maintenance. Impose criminal penalties on officials who intentionally develop loose or overbroad purge lists \u2014 and require those responsible to repay the millions in taxpayer dollars wasted on them. The right to vote is not a campaign lever for whoever is in charge atm."
            },
            {
              id: "public-funding",
              title: "Public funding of campaigns",
              body: "The majority of campaign financing comes from public funds \u2014 from taxes. This is not a cost. It is the price of a representative democracy that actually represents."
            },
            {
              id: "contribution-cap",
              title: "Private contributions capped at 40\u00d7 federal hourly minimum wage",
              body: "One donor, one candidate. The cap equals one week\u2019s pay for a minimum wage worker. The governing body matches the amount. This keeps the connection to working people visible in the structure itself \u2014 the cap is pegged to the minimum wage, not to wealth."
            },
            {
              id: "outlaw-pacs",
              title: "Outlaw PACs",

        {

          title: "Economic Structure",
          description: "An economy that serves the commonwealth, not just shareholders",
          items: [

              id: "buyback-parity",
              title: "Buyback-dividend tax parity",
              body: "When a corporation buys back its own stock, treat every shareholder as if they received a dividend. Taxable event happens when the buyback happens \u2014 not decades later when someone decides to sell, and not never when they die holding the shares. This closes the deferral loophole and ends the free ride for foreign investors who currently pay zero US tax on buyback gains while collecting 30 percent of US corporate equity. Corporations can still buy back stock. They just can\u2019t use it as a tax-free alternative to dividends anymore."
            },
            {
              id: "stepped-up-basis",
              title: "Stepped-up basis with limits",
              body: "When you die holding an asset, your heirs currently inherit it at current market value \u2014 and all the accumulated capital gains vanish. A family home and normal retirement savings should keep this protection. A $200 million stock portfolio should not get a magic reset at death. Set a threshold. Below it, heirs get the step-up. Above it, they inherit the original cost basis and pay taxes on the gains like everyone else."

              title: "Cap Roth IRA balances",

            },

              id: "estate-tax",

            {

              body: "A functioning nation \u2014 a democracy \u2014 invests in the health and education of its people \u2014 not as charity, but because that\u2019s what produces a population capable of self-governance and economic competition. Health coverage is one leg of that stool.\n\nHealth care tied to employment is not a benefit \u2014 it is a lever of control, and at scale, a moat. Large corporations love providing health insurance \u2014 not out of generosity, but because it is a barrier to entry for every competitor trying to scale. The moment a growing business crosses the threshold where it must provide coverage, it hits a cost wall that entrenched incumbents absorbed long ago. The current system doesn\u2019t just fail workers. It protects monopolies.\n\nReplace the entire mess \u2014 the premiums, the deductibles, the networks, the claims denials, the insurance company standing between you and your doctor deciding whether your treatment gets paid \u2014 with one public insurance pool, funded by taxes. You already know how this works. Your house catches fire, the fire truck shows up. You don\u2019t check whether the fire department is in-network. You don\u2019t get a bill. You already paid for it, and so did everyone else. That\u2019s the model. Apply it to health care.\n\nEvery peer nation that does this outperforms us on outcomes and spends less. The administrative overhead alone tells the story: private insurance burns roughly 15 percent on administration. Medicare runs at 2 percent. Independent analyses \u2014 including one funded by the Koch network \u2014 project trillions in savings over a decade when you account for what Americans actually spend: premiums, deductibles, copays, and the taxes already funding the 64 percent of health care the government quietly pays for now.\n\nThis is not a cost. It is a reallocation \u2014 from a fragmented system that enriches middlemen to a consolidated one that covers everyone. The side effect is a workforce unchained from jobs they\u2019d otherwise leave and a competitive landscape where startups aren\u2019t kneecapped by benefits administration before they even hit stride."
